<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">First session flow placeholder</title>
  <desc id="desc">A conceptual flow from repository to worktree, prompt, run, and review.</desc>
  <rect width="1200" height="460" rx="28" fill="#0b0f14"/>
  <g font-family="Arial" fill="#ffffff">
    <text x="80" y="80" font-size="34" font-weight="700">First session flow</text>
    <g font-size="22" text-anchor="middle">
      <rect x="70" y="170" width="180" height="90" rx="14" fill="#141b22" stroke="#314150"/><text x="160" y="224">Repository</text>
      <rect x="290" y="170" width="180" height="90" rx="14" fill="#141b22" stroke="#314150"/><text x="380" y="224">Worktree</text>
      <rect x="510" y="170" width="180" height="90" rx="14" fill="#141b22" stroke="#314150"/><text x="600" y="224">Prompt</text>
      <rect x="730" y="170" width="180" height="90" rx="14" fill="#141b22" stroke="#314150"/><text x="820" y="224">Run</text>
      <rect x="950" y="170" width="180" height="90" rx="14" fill="#2f7d68"/><text x="1040" y="224">Review</text>
    </g>
  </g>
  <g stroke="#8fd9c4" stroke-width="5" stroke-linecap="round"><path d="M255 215h30"/><path d="M475 215h30"/><path d="M695 215h30"/><path d="M915 215h30"/></g>
