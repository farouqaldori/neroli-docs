<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Parallel sessions placeholder</title>
  <desc id="desc">Comparison between shared sessions in one worktree and independent sessions in separate worktrees.</desc>
  <rect width="1200" height="500" rx="28" fill="#0b0f14"/>
  <g font-family="Arial" fill="#ffffff">
    <text x="90" y="80" font-size="30" font-weight="700">Shared branch</text>
    <rect x="90" y="120" width="430" height="280" rx="20" fill="#141b22" stroke="#314150"/>
    <rect x="140" y="190" width="150" height="72" rx="12" fill="#22322f"/><text x="168" y="235" font-size="22">Agent 1</text>
    <rect x="320" y="190" width="150" height="72" rx="12" fill="#22322f"/><text x="348" y="235" font-size="22">Agent 2</text>
    <text x="165" y="330" font-size="22" fill="#a9b8c6">one worktree</text>
    <text x="680" y="80" font-size="30" font-weight="700">Independent branches</text>
    <rect x="680" y="120" width="190" height="280" rx="20" fill="#141b22" stroke="#2f7d68"/>
    <rect x="920" y="120" width="190" height="280" rx="20" fill="#141b22" stroke="#2f7d68"/>
    <text x="725" y="230" font-size="22">Agent A</text>
    <text x="965" y="230" font-size="22">Agent B</text>
    <text x="710" y="330" font-size="22" fill="#a9b8c6">worktree A</text>
    <text x="950" y="330" font-size="22" fill="#a9b8c6">worktree B</text>
  </g>
</svg>
