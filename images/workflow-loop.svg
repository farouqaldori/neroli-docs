<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Workflow loop placeholder</title>
  <desc id="desc">A circular workflow from task to session, observe, verify, review, and archive.</desc>
  <rect width="1200" height="560" rx="28" fill="#0b0f14"/>
  <circle cx="600" cy="280" r="180" fill="none" stroke="#2f7d68" stroke-width="8"/>
  <g font-family="Arial" font-size="23" fill="#ffffff" text-anchor="middle">
    <rect x="500" y="58" width="200" height="62" rx="12" fill="#141b22"/><text x="600" y="97">Choose work</text>
    <rect x="810" y="160" width="200" height="62" rx="12" fill="#141b22"/><text x="910" y="199">Run session</text>
    <rect x="810" y="340" width="200" height="62" rx="12" fill="#141b22"/><text x="910" y="379">Observe</text>
    <rect x="500" y="440" width="200" height="62" rx="12" fill="#141b22"/><text x="600" y="479">Verify</text>
    <rect x="190" y="340" width="200" height="62" rx="12" fill="#141b22"/><text x="290" y="379">Review</text>
    <rect x="190" y="160" width="200" height="62" rx="12" fill="#141b22"/><text x="290" y="199">Merge/archive</text>
  </g>
</svg>
